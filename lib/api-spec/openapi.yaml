              schema:
                $ref: "#/components/schemas/UploadedImage"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    GenerateBarcodeResponse:
      type: object
      properties:
        barcode:
          type: string
      required: [barcode]

    # Auth
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        preferredLang:
          type: string
          enum: [ar, en]
      required: [name, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
        stores:
          type: array
          items:
            $ref: "#/components/schemas/Store"
        currentStoreId:
          type: integer
          nullable: true
      required: [token, user]

    Store:
      type: object
      properties:
        id:
          type: integer
        nameAr:
          type: string
        nameEn:
          type: string
        slug:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        address:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        tvaRate:
          type: string
          nullable: true
        showTvaByDefault:
          type: boolean
          nullable: true
        nif:
          type: string
          nullable: true
        rc:
          type: string
          nullable: true
        ai:
          type: string
          nullable: true
        defaultComptoirCustomerId:
          type: integer
          nullable: true
      required: [id, nameAr, nameEn, slug]

    SelectStoreRequest:
      type: object
      properties:
        storeId:
          type: integer
      required: [storeId]

    SelectStoreResponse:
      type: object
      properties:
        token:
          type: string
        currentStoreId:
          type: integer
        store:
          $ref: "#/components/schemas/Store"
      required: [token, currentStoreId, store]

    CreateStoreRequest:
      type: object
      properties:
        nameAr: { type: string }
        nameEn: { type: string }
        slug:   { type: string }
        isActive: { type: boolean }
        address: { type: string }
        phone: { type: string }
        logoUrl: { type: string }
        tvaRate: { type: string }
        showTvaByDefault: { type: boolean }
        nif: { type: string }
        rc: { type: string }
        ai: { type: string }
      required: [nameAr, nameEn, slug]

    UpdateStoreRequest:
      type: object
      properties:
        nameAr:   { type: string }
        nameEn:   { type: string }
        isActive: { type: boolean }
        address: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        logoUrl: { type: string, nullable: true }
        tvaRate: { type: string }
        showTvaByDefault: { type: boolean }
        nif: { type: string, nullable: true }
        rc: { type: string, nullable: true }
        ai: { type: string, nullable: true }
        defaultComptoirCustomerId: { type: integer, nullable: true }

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, admin, employee]
        preferredLang:
          type: string
          enum: [ar, en]
        stores:
          type: array
          items:
            $ref: "#/components/schemas/Store"
        currentStoreId:
          type: integer
          nullable: true
      required: [id, name, email, role]

    # Products
    Product:
      type: object
      properties:
        id:
          type: integer
        nameAr:
          type: string
        nameEn:
          type: string
        descriptionAr:
          type: string
        descriptionEn:
          type: string
        price:
          type: string
        imageUrl:
          type: string
          nullable: true
        stock:
          type: integer
        categoryId:
          type: integer
          nullable: true
        rating:
          type: string
        reviewCount:
          type: integer
        createdAt:
          type: string
        reference:
          type: string
          nullable: true
        barcode:
          type: string
          nullable: true
        costPrice:
          type: string
          nullable: true
        catalogueType:
          type: string
          nullable: true
        brand:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        colisage:
          type: integer
          nullable: true
        weight:
          type: string
          nullable: true
        priceGros:
          type: string
          nullable: true
        priceSemiGros:
          type: string
          nullable: true
        priceMin:
          type: string
          nullable: true
        catalogue1:
          type: string
          nullable: true
        catalogue2:
          type: string
          nullable: true
        catalogue3:
          type: string
          nullable: true
        catalogue4:
          type: string
          nullable: true
        catalogue5:
          type: string
          nullable: true
        catalogue6:
          type: string
          nullable: true
        isActive:
          type: boolean
          nullable: true
        isExposed:
          type: boolean
          nullable: true
        familyId:
          type: integer
          nullable: true
        brandId:
          type: integer
          nullable: true
        colorId:
          type: integer
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/ProductImage"
        primaryImage:
          type: string
          nullable: true
      required: [id, nameAr, nameEn, price, stock, rating, reviewCount]

    ProductImage:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
