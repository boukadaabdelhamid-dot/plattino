openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Midanic E-Commerce & ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: products
  - name: categories
  - name: cart
  - name: orders
  - name: admin
  - name: erp
  - name: storage

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/select-store:
    post:
      operationId: selectStore
      tags: [auth]
      summary: Switch to another store the user has access to (re-issues JWT)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectStoreRequest"
      responses:
        "200":
          description: Selected store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelectStoreResponse"

  /stores/public:
    get:
      operationId: getPublicStores
      tags: [storage]
      summary: List active stores (storefront switcher)
      responses:
        "200":
          description: Stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"

  /erp/stores:
    get:
      operationId: getErpStores
      tags: [erp]
      summary: List all stores (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"
    post:
      operationId: createErpStore
      tags: [erp]
      summary: Create a new store
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /erp/stores/all:
    get:
      operationId: getErpStoresAll
      tags: [erp]
      summary: List all active tenant stores (any staff)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"

  /erp/stores/mine:
    get:
      operationId: getErpStoresMine
      tags: [erp]
      summary: Stores the current user belongs to (with profile fields)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: My stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Store"

  /erp/stores/{id}:
    patch:
      operationId: updateErpStore
      tags: [erp]
      summary: Update a store (rename / activate / deactivate)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
    delete:
      operationId: deleteErpStore
      tags: [erp]
      summary: Delete a store (only if it has no data)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /erp/products/generate-barcode:
    post:
      operationId: generateProductBarcode
      tags: [erp]
      summary: Generate a unique EAN-13 barcode for the current store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Generated barcode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateBarcodeResponse"

  # ── Products ──────────────────────────────────────────────────────
  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List products
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: categoryId
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: filterName
          schema:
            type: string
        - in: query
          name: filterCode
          schema:
            type: string
        - in: query
          name: filterBrand
          schema:
            type: string
        - in: query
          name: filterFamily
          schema:
            type: string
        - in: query
          name: filterStock
          schema:
            type: string
        - in: query
          name: inStockOnly
          schema:
            type: boolean
          description: When true, return only products whose store stock is > 0.
        - in: query
          name: filterCatalogueType
          schema:
            type: string
        - in: query
          name: filterDescription
          schema:
            type: string
        - in: query
          name: filterModel
          schema:
            type: string
        - in: query
          name: filterColor
          schema:
            type: string
        - in: query
          name: filterColisage
          schema:
            type: string
        - in: query
          name: filterWeight
          schema:
            type: string
        - in: query
          name: filterCatalogue1
          schema:
            type: string
        - in: query
          name: filterCatalogue2
          schema:
            type: string
        - in: query
          name: filterCatalogue3
          schema:
            type: string
        - in: query
          name: filterCatalogue4
          schema:
            type: string
        - in: query
          name: filterCatalogue5
          schema:
            type: string
        - in: query
          name: filterCatalogue6
          schema:
            type: string
        - in: query
          name: filterPrice
          schema:
            type: string
        - in: query
          name: filterPriceGros
          schema:
            type: string
        - in: query
          name: filterPriceSemiGros
          schema:
            type: string
        - in: query
          name: filterPriceMin
          schema:
            type: string
        - in: query
          name: filterBarcode
          schema:
            type: string
        - in: query
          name: filterReference
          schema:
            type: string
        - in: query
          name: filterId
          schema:
            type: string
        - in: query
          name: filterRef
          schema:
            type: string
        - in: query
          name: filterCreatedAt
          schema:
            type: string
        - in: query
          name: filterExposed
          schema:
            type: string
        - in: query
          name: filterActive
          schema:
            type: string
        - in: query
          name: filterCostPrice
          schema:
            type: string
      responses:
        "200":
          description: Products list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetail"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update product (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /products/{id}/reviews:
    post:
      operationId: createReview
      tags: [products]
      summary: Add product review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /products/{id}/images:
    put:
      operationId: setProductImages
      tags: [products]
      summary: Replace a product's image gallery (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    $ref: "#/components/schemas/ProductImageInput"
              required: [images]
      responses:
        "200":
          description: Updated image gallery
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductImage"

  # ── Categories ────────────────────────────────────────────────────
  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update category (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Cart ──────────────────────────────────────────────────────────
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get cart items
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartRequest"
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /cart/{productId}:
    put:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /coupons/validate:
    post:
      operationId: validateCoupon
      tags: [cart]
      summary: Validate coupon code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCouponRequest"
      responses:
        "200":
          description: Coupon valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponValidationResponse"

  # ── Orders ────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: getMyOrders
      tags: [orders]
      summary: Get my orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"

  # ── Admin ────────────────────────────────────────────────────────
  /admin/orders:
    get:
      operationId: getAdminOrders
      tags: [admin]
      summary: Get all orders (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: channel
          description: |
            Filter by sales channel.
            `online` = web/mobile storefront orders (no seller),
            `pos` = in-store cashier sales,
            `all` (default) = both.
          schema:
            type: string
            enum: [all, online, pos]
            default: all
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /admin/orders/{id}/status:
    put:
      operationId: updateOrderStatus
      tags: [admin]
      summary: Update order status (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/orders/{id}/retours:
    post:
      operationId: createBonRetour
      tags: [admin]
      summary: Create a Bon Retour for an order
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBonRetourRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonRetourDetail"

  /admin/retours:
    get:
      operationId: getAdminRetours
      tags: [admin]
      summary: List all Bons Retour (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Retours
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BonRetour"
    post:
      operationId: createStandaloneRetour
      tags: [admin]
      summary: Create a standalone Bon Retour (no linked order)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStandaloneRetourRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonRetourDetail"

  /admin/retours/{id}:
    get:
      operationId: getAdminRetour
      tags: [admin]
      summary: Get Bon Retour detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Retour detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BonRetourDetail"

  /admin/analytics:
    get:
      operationId: getAnalytics
      tags: [admin]
      summary: Get analytics (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics"

  /admin/reports/products:
    get:
      operationId: getProductProfitReport
      tags: [admin]
      summary: Per-product profit report
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: Product profit rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductProfitRow"

  /admin/reports/customers:
    get:
      operationId: getCustomerProfitReport
      tags: [admin]
      summary: Per-customer revenue and balance report
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: Customer profit rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerProfitRow"

  /admin/reports/suppliers:
    get:
      operationId: getSupplierReport
      tags: [admin]
      summary: Per-supplier purchases and payables report
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: Supplier report rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierReportRow"

  /admin/reports/monthly:
    get:
      operationId: getMonthlyReport
      tags: [admin]
      summary: Month-by-month revenue vs expenses vs profit comparison
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        "200":
          description: Monthly report rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyReportRow"

  /admin/low-stock:
    get:
      operationId: getLowStock
      tags: [admin]
      summary: Get low-stock products (admin)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: threshold
          required: false
          schema:
            type: integer
            default: 5
          description: Stock level below which a product is considered low-stock
      responses:
        "200":
          description: Low-stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  # ── ERP: Employees ───────────────────────────────────────────────
  /erp/employees:
    get:
      operationId: getEmployees
      tags: [erp]
      summary: List employees
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [erp]
      summary: Create employee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /erp/employees/{id}:
    put:
      operationId: updateEmployee
      tags: [erp]
      summary: Update employee
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [erp]
      summary: Archive employee
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archived
          content:
